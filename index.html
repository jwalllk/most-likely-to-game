<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Most Likely To</title>
<style>
  :root{
    --pink:#ff5da2; --pink2:#ff85bd; --deep:#7a1f54; --cream:#fff5fa;
    --gold:#f4c542; --ink:#3a1330; --soft:#ffe3f1;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 20% 10%, #ffd9ec 0, transparent 40%),
      radial-gradient(circle at 85% 90%, #ffe9b0 0, transparent 45%),
      linear-gradient(160deg,#ffeaf4,#fff6fb);
    min-height:100%;
    display:flex;flex-direction:column;align-items:center;
    padding:16px;
  }
  .wrap{width:100%;max-width:1100px;margin:auto;text-align:center}
  h1{font-size:clamp(28px,6vw,64px);margin:.1em 0;color:var(--deep);letter-spacing:1px}
  .sub{color:var(--pink);font-weight:bold;font-size:clamp(14px,2.5vw,22px)}
  button{
    font:inherit;font-weight:bold;border:none;cursor:pointer;border-radius:999px;
    padding:16px 30px;font-size:clamp(16px,2.5vw,22px);color:#fff;
    background:linear-gradient(135deg,var(--pink),var(--deep));
    box-shadow:0 8px 22px rgba(122,31,84,.30);transition:transform .08s, box-shadow .1s;
    margin:8px;
  }
  button:active{transform:translateY(2px) scale(.99)}
  button.ghost{background:#fff;color:var(--deep);border:2px solid var(--pink)}
  button.gold{background:linear-gradient(135deg,#ffd66b,#e0a312);color:#5a3b00}
  button:disabled{opacity:.45;cursor:default}
  .card{background:rgba(255,255,255,.78);border:2px solid #ffd0e6;border-radius:26px;
    padding:26px;box-shadow:0 14px 40px rgba(122,31,84,.14);backdrop-filter:blur(4px)}
  .prompt{font-size:clamp(24px,5vw,54px);font-weight:bold;color:var(--deep);line-height:1.2;margin:10px auto;max-width:18ch}
  .prompt .ml{display:block;font-size:.45em;color:var(--pink);letter-spacing:3px;text-transform:uppercase}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
  @media(min-width:700px){.grid{grid-template-columns:repeat(3,1fr);gap:18px}}
  .face{position:relative;border:4px solid transparent;border-radius:20px;overflow:hidden;
    background:#fff;cursor:pointer;transition:transform .08s, border-color .1s;aspect-ratio:1}
  .face img{width:100%;height:100%;object-fit:cover;display:block}
  .face .nm{position:absolute;left:0;right:0;bottom:0;background:rgba(122,31,84,.78);color:#fff;
    font-weight:bold;font-size:clamp(12px,2.2vw,18px);padding:5px 2px}
  .face.sel{border-color:var(--gold);transform:scale(1.02);box-shadow:0 0 0 4px rgba(244,197,66,.4)}
  .face:active{transform:scale(.97)}
  .timer{font-size:clamp(40px,12vw,120px);font-weight:bold;color:var(--deep);line-height:1}
  .bar{height:14px;background:#ffd9ec;border-radius:999px;overflow:hidden;margin:14px auto;max-width:600px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--pink));transition:width .3s linear}
  .qr{background:#fff;padding:14px;border-radius:20px;display:inline-block;box-shadow:0 8px 24px rgba(0,0,0,.12)}
  .qr img{display:block;width:300px;height:300px}
  .url{font-family:monospace;background:#fff;border:1px dashed var(--pink);border-radius:10px;padding:8px 12px;display:inline-block;margin-top:10px;word-break:break-all}
  .players{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px}
  .chip{background:#fff;border:2px solid var(--pink2);color:var(--deep);font-weight:bold;border-radius:999px;padding:8px 16px;font-size:clamp(14px,2vw,20px)}
  .podium{display:flex;justify-content:center;align-items:flex-end;gap:18px;flex-wrap:wrap;margin-top:18px}
  .pod{display:flex;flex-direction:column;align-items:center}
  .pod img{width:clamp(90px,16vw,200px);height:clamp(90px,16vw,200px);object-fit:cover;border-radius:20px;border:5px solid var(--gold);box-shadow:0 10px 26px rgba(0,0,0,.18)}
  .pod .medal{font-size:clamp(34px,7vw,64px)}
  .pod .who{font-weight:bold;font-size:clamp(16px,2.6vw,28px);color:var(--deep);margin-top:6px}
  .pod .cnt{color:var(--pink);font-weight:bold}
  .pod.p2 img,.pod.p3 img{width:clamp(70px,12vw,150px);height:clamp(70px,12vw,150px);border-color:#cfcfcf}
  .note{color:var(--pink);font-weight:bold;margin-top:10px}
  .small{font-size:13px;color:#9a6b88;margin-top:18px}
  .toolbar{margin-top:18px}
  .toolbar button{padding:10px 18px;font-size:15px}
  .setup{background:#fff3f8;border:2px solid var(--pink);border-radius:18px;padding:20px;max-width:560px;margin:20px auto;text-align:left}
  input.name{font:inherit;font-size:22px;padding:14px 18px;border-radius:14px;border:2px solid var(--pink);width:100%;max-width:360px;text-align:center}
  .big{font-size:clamp(22px,4vw,40px);font-weight:bold;color:var(--deep)}
  .confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden}
</style>
</head>

const NAMES = Object.keys(FACES);
const QUESTION_SECONDS = 15;

const app = document.getElementById('app');
const params = new URLSearchParams(location.search);
const role = params.get('host')!=null ? 'host' : (params.get('play')!=null ? 'play' : 'land');
const playerUrl = location.origin + location.pathname + '?play';

function deviceId(){
  try{ let id=localStorage.getItem('mlt_id'); if(!id){id='d'+Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem('mlt_id',id);} return id; }
  catch(e){ if(!window._did) window._did='d'+Math.random().toString(36).slice(2); return window._did; }
}
const MYID = deviceId();
let myVotes = {};

const configReady = firebaseConfig && firebaseConfig.apiKey && String(firebaseConfig.apiKey).indexOf('PASTE')===-1;
let db, room, meta;
if(configReady){
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  room = db.ref('rooms/main');
  meta = room.child('meta');
}

function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function tally(votesForQ){
  const c={}; NAMES.forEach(n=>c[n]=0);
  Object.values(votesForQ||{}).forEach(n=>{ if(c[n]!=null) c[n]++; });
  return Object.entries(c).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
}

function setupBanner(){
  return `<div class="setup"><b>Setup not finished:</b> the Firebase config hasn't been added yet, so live voting won't work yet.</div>`;
}

function renderLanding(){
  app.innerHTML = `
    <h1>Most Likely To 💍</h1>
    <p class="sub">Bachelorette Edition</p>
    <div class="card" style="margin-top:20px">
      <p class="big">Where are you?</p>
      <button class="gold" onclick="location.search='?host'">📺 I'm the TV / Host</button>
      <button onclick="location.search='?play'">📱 Join on my phone</button>
    </div>
    ${configReady?'':setupBanner()}
    <p class="small">Host opens this on the big screen. Everyone else taps "Join on my phone."</p>`;
}

function renderHost(){
  if(!configReady){ app.innerHTML='<h1>Most Likely To 💍</h1>'+setupBanner(); return; }
  let data={};
  let advancing=false;

  room.on('value', snap=>{ data = snap.val()||{}; draw(); });

  setInterval(()=>{
    const m = data.meta||{};
    if(m.state==='playing' && m.deadline && Date.now()>m.deadline+150 && !advancing){
      advancing=true; advance(m).then(()=>advancing=false).catch(()=>advancing=false);
    }
    updateTimer();
  }, 250);

  function advance(m){
    const q=m.currentQ||0;
    if(q < PROMPTS.length-1) return meta.update({currentQ:q+1, deadline:Date.now()+QUESTION_SECONDS*1000});
    return meta.update({state:'reveal', revealIndex:0});
  }
  window._hostStart=()=>{ room.child('votes').remove(); meta.set({state:'playing',currentQ:0,deadline:Date.now()+QUESTION_SECONDS*1000,revealIndex:0}); };
  window._hostNext=()=>{ const m=data.meta||{}; advancing=true; advance(m).then(()=>advancing=false); };
  window._revealNext=()=>{ const m=data.meta||{}; const r=m.revealIndex||0; if(r<PROMPTS.length-1) meta.update({revealIndex:r+1}); else meta.update({state:'done'}); };
  window._revealPrev=()=>{ const m=data.meta||{}; const r=m.revealIndex||0; if(r>0) meta.update({revealIndex:r-1}); };
  window._reset=()=>{ if(confirm('Start a new game? This clears all votes (players stay joined).')){ room.child('votes').remove(); meta.set({state:'lobby',currentQ:0,deadline:0,revealIndex:0}); } };
  window._kickAll=()=>{ if(confirm('Remove all joined players too?')){ room.child('players').remove(); } };

  function draw(){
    const m=data.meta||{}; const st=m.state||'lobby';
    const players=Object.values(data.players||{});
    if(st==='lobby') return drawLobby(players);
    if(st==='playing') return drawPlaying(m,data);
    if(st==='reveal') return drawReveal(m,data);
    if(st==='done') return drawDone(data);
    drawLobby(players);
  }

  function drawLobby(players){
    app.innerHTML = `
      <h1>Most Likely To 💍</h1>
      <p class="sub">Scan to join — then look at this screen!</p>
      <div style="display:flex;gap:30px;flex-wrap:wrap;justify-content:center;align-items:center;margin-top:10px">
        <div class="qr"><img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=6&data=${encodeURIComponent(playerUrl)}" alt="QR"></div>
        <div>
          <p class="big">${players.length} joined</p>
          <div class="players">${players.map(p=>`<span class="chip">${esc(p.name||'?')}</span>`).join('')||'<span class="small">waiting for players…</span>'}</div>
        </div>
      </div>
      <div class="url">${esc(playerUrl)}</div>
      <div class="toolbar">
        <button class="gold" onclick="_hostStart()" ${players.length?'':'disabled'}>▶ Start Game (${PROMPTS.length} prompts)</button>
      </div>
      <div class="toolbar"><button class="ghost" onclick="_kickAll()">Clear players</button></div>
      <p class="small">Self-votes are allowed. Each phone = one vote per prompt. ${QUESTION_SECONDS}s per prompt.</p>`;
  }

  function drawPlaying(m,data){
    const q=m.currentQ||0;
    const voted=Object.keys((data.votes&&data.votes[q])||{}).length;
    const total=Object.keys(data.players||{}).length;
    app.innerHTML = `
      <p class="sub">Prompt ${q+1} of ${PROMPTS.length}</p>
      <div class="prompt"><span class="ml">Most likely to…</span>${esc(PROMPTS[q])}</div>
      <div class="timer" id="tnum">${QUESTION_SECONDS}</div>
      <div class="bar"><i id="tbar" style="width:100%"></i></div>
      <p class="note">🗳️ ${voted} / ${total} voted</p>
      <div class="grid">${NAMES.map(n=>`<div class="face"><img src="${FACES[n]}"><div class="nm">${esc(n)}</div></div>`).join('')}</div>
      <div class="toolbar"><button class="ghost" onclick="_hostNext()">Skip / Next ⏭</button> <button class="ghost" onclick="_reset()">Reset</button></div>`;
    updateTimer();
  }

  function updateTimer(){
    const m=data.meta||{}; if(m.state!=='playing') return;
    const tn=document.getElementById('tnum'); const tb=document.getElementById('tbar'); if(!tn||!tb)return;
    const left=Math.max(0,(m.deadline-Date.now())/1000);
    tn.textContent=Math.ceil(left);
    tb.style.width=(100*left/QUESTION_SECONDS)+'%';
    if(left<=5) tn.style.color='#d11'; else tn.style.color='';
  }

  function drawReveal(m,data){
    const r=m.revealIndex||0;
    const res=tally((data.votes&&data.votes[r])||{});
    const medals=['🥇','🥈','🥉']; const cls=['p1','p2','p3'];
    const top=res.slice(0,3);
    app.innerHTML = `
      <p class="sub">Results — ${r+1} of ${PROMPTS.length}</p>
      <div class="prompt"><span class="ml">Most likely to…</span>${esc(PROMPTS[r])}</div>
      <div class="podium">
        ${top.length? top.map((e,i)=>`
          <div class="pod ${cls[i]}">
            <div class="medal">${medals[i]}</div>
            <img src="${FACES[e[0]]}">
            <div class="who">${esc(e[0])}</div>
            <div class="cnt">${e[1]} vote${e[1]>1?'s':''}</div>
          </div>`).join('') : '<p class="big">No votes 🤷</p>'}
      </div>
      <div class="toolbar">
        <button class="ghost" onclick="_revealPrev()" ${r>0?'':'disabled'}>⬅ Back</button>
        <button class="gold" onclick="_revealNext()">${r<PROMPTS.length-1?'Next ➡':'Finish 🎉'}</button>
      </div>`;
  }

  function drawDone(data){
    const wins={};
    for(let q=0;q<PROMPTS.length;q++){ const res=tally((data.votes&&data.votes[q])||{}); if(res.length) wins[res[0][0]]=(wins[res[0][0]]||0)+1; }
    const board=Object.entries(wins).sort((a,b)=>b[1]-a[1]).slice(0,3);
    const medals=['🥇','🥈','🥉'];
    app.innerHTML = `
      <h1>That's a wrap! 🎉💍</h1>
      <p class="sub">Most "Most Likely To" wins</p>
      <div class="podium">
        ${board.map((e,i)=>`<div class="pod ${i?'p2':''}"><div class="medal">${medals[i]}</div><img src="${FACES[e[0]]}"><div class="who">${esc(e[0])}</div><div class="cnt">${e[1]} title${e[1]>1?'s':''}</div></div>`).join('')||'<p class="big">No votes recorded</p>'}
      </div>
      <div class="toolbar">
        <button class="ghost" onclick="meta.update({state:'reveal',revealIndex:0})">⬅ Review prompts</button>
        <button class="gold" onclick="_reset()">🔁 Play again</button>
      </div>`;
    party();
  }
}

function renderPlay(){
  if(!configReady){ app.innerHTML='<h1>Most Likely To 💍</h1>'+setupBanner(); return; }
  let m={}; let joined=false; let myName='';

  room.child('players/'+MYID).once('value',s=>{ if(s.exists()){ joined=true; myName=(s.val()||{}).name||''; } start(); });

  function start(){
    meta.on('value', snap=>{ m=snap.val()||{}; draw(); });
  }

  window._join=()=>{
    const v=document.getElementById('nm').value.trim(); if(!v){return;}
    myName=v; joined=true;
    room.child('players/'+MYID).set({name:v, joinedAt:firebase.database.ServerValue.TIMESTAMP});
    draw();
  };
  window._vote=(n)=>{
    const q=m.currentQ||0;
    if(m.state!=='playing') return;
    if(m.deadline && Date.now()>m.deadline) return;
    myVotes[q]=n;
    room.child('votes/'+q+'/'+MYID).set(n);
    draw();
  };

  function draw(){
    if(!joined) return drawJoin();
    const st=m.state||'lobby';
    if(st==='playing') return drawVote();
    if(st==='reveal'||st==='done') return drawWatch('👀 Look at the TV for the results!');
    drawWatch(`💖 You're in, ${esc(myName)}! Waiting for the host to start…`);
  }

  function drawJoin(){
    app.innerHTML = `
      <h1>Most Likely To 💍</h1>
      <p class="sub">Type your name to join</p>
      <div class="card">
        <input class="name" id="nm" placeholder="Your name" maxlength="14"
          value="${esc(myName)}" autocomplete="off"
          onkeydown="if(event.key==='Enter')_join()">
        <div><button class="gold" onclick="_join()">Join 🎉</button></div>
      </div>`;
    setTimeout(()=>{const e=document.getElementById('nm');if(e)e.focus();},100);
  }

  function drawWatch(msg){
    app.innerHTML = `<div class="card" style="margin-top:30px"><p class="big">${msg}</p></div>`;
  }

  function drawVote(){
    const q=m.currentQ||0;
    const expired = m.deadline && Date.now()>m.deadline;
    const sel=myVotes[q];
    app.innerHTML = `
      <p class="sub">Prompt ${q+1} of ${PROMPTS.length}</p>
      <div class="prompt" style="font-size:clamp(20px,6vw,30px)"><span class="ml">Most likely to…</span>${esc(PROMPTS[q])}</div>
      <div class="timer" id="ptn" style="font-size:clamp(30px,12vw,60px)"></div>
      <div class="grid">
        ${NAMES.map(n=>`<div class="face ${sel===n?'sel':''}" onclick="_vote('${n.replace(/'/g,"\\'")}')"><img src="${FACES[n]}"><div class="nm">${esc(n)}</div></div>`).join('')}
      </div>
      <p class="note" id="pmsg">${sel?('✅ You picked '+esc(sel)+(expired?'':' — tap to change')):(expired?'⏰ Time up':'👆 Tap your pick!')}</p>`;
    tick();
  }
  function tick(){
    const el=document.getElementById('ptn'); if(!el||m.state!=='playing')return;
    const left=Math.max(0,Math.ceil((m.deadline-Date.now())/1000));
    el.textContent=left+'s'; el.style.color=left<=5?'#d11':'';
    if(left>0) setTimeout(tick,300);
    else { const pm=document.getElementById('pmsg'); if(pm&&!myVotes[m.currentQ||0]) pm.textContent='⏰ Time up'; }
  }
}

function party(){
  const c=document.createElement('div'); c.className='confetti'; document.body.appendChild(c);
  const em=['💖','🥂','💍','🎉','✨','💗'];
  for(let i=0;i<60;i++){
    const s=document.createElement('div'); s.textContent=em[i%em.length];
    s.style.cssText=`position:absolute;top:-40px;left:${Math.random()*100}%;font-size:${18+Math.random()*22}px;transition:transform 4s linear, opacity 4s;opacity:1`;
    c.appendChild(s);
    requestAnimationFrame(()=>{ s.style.transform=`translateY(${window.innerHeight+80}px) rotate(${Math.random()*720-360}deg)`; s.style.opacity=0; });
  }
  setTimeout(()=>c.remove(),4200);
}

if(role==='host') renderHost();
else if(role==='play') renderPlay();
else renderLanding();
</script>
</body>
</html>
